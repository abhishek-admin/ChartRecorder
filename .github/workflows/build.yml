name: Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Dump env for debugging
        run: echo "JAVA_OPTS=$JAVA_OPTS" && echo "GRADLE_OPTS=$GRADLE_OPTS" && echo "ANDROID_HOME=$ANDROID_HOME"

      - name: Build debug APK
        run: bash gradlew assembleDebug --info --stacktrace 2>&1 | tail -100

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChartRecorder-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
